name: Pull Request Automation
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: |
          RESULT=$(npm run lint 2>&1)
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run Prettier formatting checks
        id: prettier
        run: |
          RESULT=$(npx prettier --check . 2>&1)
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const { output: eslintOutput } = ${{ steps.eslint.outputs }};
            const { output: prettierOutput } = ${{ steps.prettier.outputs }};
            
            const comment = `## Code Quality Report
            
            ### ESLint Results
            \`\`\`bash
            ${eslintOutput || 'No ESLint output'}
            \`\`\`
            
            ### Prettier Results
            \`\`\`bash
            ${prettierOutput || 'No Prettier output'}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: test
        run: |
          RESULT=$(npm test -- --coverage 2>&1)
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
          # Ensure coverage directory is created
          npm test -- --coverage || true
        continue-on-error: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
          if-no-files-found: warn

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const { output: testOutput } = ${{ steps.test.outputs }};
            
            const comment = `## Test Coverage Report
            
            \`\`\`bash
            ${testOutput || 'No test output'}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check
        id: npm-audit
        run: |
          RESULT=$(npm audit 2>&1)
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Scan for secrets with Gitleaks
        id: gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --verbose
        continue-on-error: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const { output: auditOutput } = ${{ steps.npm-audit.outputs }};
            const gitleaksOutput = `${{ steps.gitleaks.outputs.stdout || 'No secrets detected' }}`;
            
            const comment = `## Security Scan Report
            
            ### Dependencies Vulnerabilities
            \`\`\`bash
            ${auditOutput || 'No audit output'}
            \`\`\`
            
            ### Secrets Scan Results
            \`\`\`bash
            ${gitleaksOutput}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: |
          RESULT=$(npm run build 2>&1)
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Validate endpoints (example)
        id: endpoints
        run: |
          # Note: Adjust this step based on your actual application endpoints
          RESULT="Endpoint validation: No specific endpoints configured for this project yet (update this step for your app)"
          echo "output=$RESULT" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist
          if-no-files-found: warn

      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const { output: buildOutput } = ${{ steps.build.outputs }};
            const { output: endpointOutput } = ${{ steps.endpoints.outputs }};
            
            const comment = `## Build Validation
            
            ### Build Results
            \`\`\`bash
            ${buildOutput || 'No build output'}
            \`\`\`
            
            ### Endpoint Validation
            \`\`\`bash
            ${endpointOutput}
            \`\`\`
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });